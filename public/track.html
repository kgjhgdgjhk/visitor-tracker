<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تم تسجيل زيارتك</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 30px;
            padding: 50px;
            text-align: center;
            max-width: 600px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.3);
            animation: scaleIn 0.8s ease;
        }

        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .checkmark {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            animation: bounce 1s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .checkmark i {
            font-size: 50px;
            color: white;
        }

        h1 {
            font-size: 2.5em;
            color: #333;
            margin-bottom: 20px;
            animation: fadeIn 1s ease 0.3s both;
        }

        p {
            color: #666;
            font-size: 1.2em;
            line-height: 1.6;
            margin-bottom: 30px;
            animation: fadeIn 1s ease 0.6s both;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .info-box {
            background: #f8f9fa;
            border-radius: 20px;
            padding: 20px;
            margin: 30px 0;
            animation: slideUp 0.8s ease 0.9s both;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .info-item {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin: 15px 0;
            color: #555;
        }

        .info-item i {
            color: #667eea;
            font-size: 1.2em;
        }

        .button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 1.1em;
            cursor: pointer;
            transition: transform 0.3s;
            animation: fadeIn 1s ease 1.2s both;
        }

        .button:hover {
            transform: scale(1.1);
        }

        .dots {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 20px 0;
        }

        .dot {
            width: 12px;
            height: 12px;
            background: #667eea;
            border-radius: 50%;
            animation: wave 1.5s infinite;
        }

        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes wave {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-15px); }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="card">
        <div class="checkmark">
            <i class="fas fa-check"></i>
        </div>
        
        <h1>تم تسجيل زيارتك بنجاح!</h1>
        
        <p>شكراً لزيارتك، تم تسجيل جميع بياناتك في النظام</p>
        
        <div class="dots">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
        
        <div class="info-box">
            <div class="info-item">
                <i class="fas fa-clock"></i>
                <span id="visit-time"></span>
            </div>
            <div class="info-item">
                <i class="fas fa-globe"></i>
                <span id="location-info">جاري تحديد موقعك...</span>
            </div>
            <div class="info-item">
                <i class="fas fa-mobile-alt"></i>
                <span id="device-info">جاري تحليل جهازك...</span>
            </div>
        </div>
        
        <button class="button" onclick="goBack()">
            <i class="fas fa-arrow-left" style="margin-left: 10px;"></i>
            العودة للصفحة السابقة
        </button>
    </div>

    <script>
        // عرض وقت الزيارة
        const now = new Date();
        document.getElementById('visit-time').textContent = 
            now.toLocaleString('ar-SA', { hour: '2-digit', minute: '2-digit', second: '2-digit' });

        // تحديد معلومات الجهاز
        const userAgent = navigator.userAgent;
        let os = 'Unknown';
        let browser = 'Unknown';
        
        if (userAgent.indexOf('Windows') !== -1) os = 'Windows';
        else if (userAgent.indexOf('Mac') !== -1) os = 'MacOS';
        else if (userAgent.indexOf('Linux') !== -1) os = 'Linux';
        else if (userAgent.indexOf('Android') !== -1) os = 'Android';
        else if (userAgent.indexOf('iOS') !== -1) os = 'iOS';
        
        if (userAgent.indexOf('Chrome') !== -1) browser = 'Chrome';
        else if (userAgent.indexOf('Firefox') !== -1) browser = 'Firefox';
        else if (userAgent.indexOf('Safari') !== -1) browser = 'Safari';
        else if (userAgent.indexOf('Edge') !== -1) browser = 'Edge';
        
        document.getElementById('device-info').textContent = `${os} - ${browser}`;

        // تحديد الموقع التقريبي (اختياري)
        fetch('https://ipapi.co/json/')
            .then(res => res.json())
            .then(data => {
                document.getElementById('location-info').textContent = 
                    `${data.city || 'مدينة غير معروفة'}, ${data.country_name || 'دولة غير معروفة'}`;
            })
            .catch(() => {
                document.getElementById('location-info').textContent = 'تعذر تحديد الموقع';
            });

        function goBack() {
            window.history.back();
        }
    </script>
</body>
</html>
